<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ClimBetter — Force Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #ff6b35;
    --accent2: #ff9f1c;
    --green: #00e676;
    --red: #ff5252;
    --blue: #448aff;
    --purple: #b388ff;
    --cyan: #18ffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #12121a, var(--bg));
  }
  .logo {
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .battery-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Connection Panel */
  .connect-panel {
    padding: 16px 20px;
    display: flex;
    gap: 12px;
  }
  .connect-btn {
    flex: 1;
    padding: 14px 12px;
    border: 2px dashed var(--border);
    border-radius: 14px;
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .connect-btn.connected {
    border: 2px solid var(--green);
    color: var(--green);
    background: rgba(0, 230, 118, 0.08);
  }
  .connect-btn .icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .connect-btn .status { font-size: 11px; font-weight: 400; opacity: 0.7; }

  /* Live Force Display */
  .force-display {
    padding: 20px;
    text-align: center;
  }
  .force-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: all 0.15s;
  }
  .force-unit {
    font-size: 20px;
    color: var(--text-dim);
    margin-top: 2px;
    font-weight: 300;
  }
  .force-individual {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 12px;
  }
  .force-sensor {
    text-align: center;
  }
  .force-sensor .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .force-sensor .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--cyan);
  }

  /* Session Controls */
  .controls {
    padding: 0 20px 16px;
    display: flex;
    gap: 12px;
  }
  .btn-session {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--green), #00c853);
    color: #000;
  }
  .btn-stop {
    background: linear-gradient(135deg, var(--red), #d50000);
    color: #fff;
  }
  .btn-end {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }
  .btn-tare {
    width: 60px;
    flex: none;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 600;
  }
  .btn-session:active { transform: scale(0.96); }
  .btn-session:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Canvas Chart */
  .chart-container {
    padding: 0 20px;
    margin-bottom: 12px;
  }
  canvas#liveChart {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  /* Current Sequence Stats */
  .current-seq {
    margin: 0 20px 12px;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    display: none;
  }
  .current-seq.active { display: block; }
  .current-seq .seq-title {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat-item {
    text-align: center;
  }
  .stat-item .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-item .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  /* Sequence History */
  .history {
    padding: 0 20px 100px;
  }
  .history-title {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .seq-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--accent);
    animation: slideIn 0.3s ease;
  }
  .seq-card.rest {
    border-left-color: var(--text-dim);
    opacity: 0.6;
  }
  .seq-card .seq-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .seq-card .seq-name {
    font-weight: 700;
    font-size: 14px;
  }
  .seq-card .seq-duration {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .seq-card .seq-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
  }
  .seq-card .seq-stats span {
    font-family: 'JetBrains Mono', monospace;
  }
  .seq-card .seq-stats .lbl { color: var(--text-dim); }

  /* Summary Overlay */
  .summary-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    display: none;
    overflow-y: auto;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  .summary-overlay.active { display: block; }
  .summary-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 24px;
    max-width: 500px;
    margin: 0 auto;
    border: 1px solid var(--border);
  }
  .summary-card h2 {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .summary-card .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .perf-score {
    text-align: center;
    padding: 20px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(255,159,28,0.1));
    border-radius: 16px;
    border: 1px solid rgba(255,107,53,0.2);
  }
  .perf-score .score-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .perf-score .score-label {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .summary-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .summary-stat {
    background: var(--surface2);
    padding: 14px;
    border-radius: 12px;
    text-align: center;
  }
  .summary-stat .s-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-stat .s-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
  }
  .summary-sequences {
    margin-top: 16px;
  }
  .summary-sequences h3 {
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .btn-close-summary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: #000;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Session Timer */
  .session-timer {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-dim);
    padding: 4px 0 12px;
    display: none;
  }
  .session-timer.active { display: block; }
  .session-timer .dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    margin-right: 6px;
    animation: blink 1s infinite;
  }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Status bar */
  .status-bar {
    padding: 8px 20px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Clim<span>Better</span> <small style="font-weight:300;font-size:12px;color:var(--text-dim)">Force Lab</small></div>
  <div class="battery-info" id="batteryInfo"></div>
</div>

<!-- Connection -->
<div class="connect-panel">
  <button class="connect-btn" id="btnConnectL" onclick="connectSensor('L')">
    <span class="icon">🤚</span>
    Main Gauche
    <div class="status" id="statusL">Non connecté</div>
  </button>
  <button class="connect-btn" id="btnConnectR" onclick="connectSensor('R')">
    <span class="icon">✋</span>
    Main Droite
    <div class="status" id="statusR">Non connecté</div>
  </button>
</div>

<!-- Live Force -->
<div class="force-display">
  <div class="force-total" id="forceTotal">0.0</div>
  <div class="force-unit">kg (total)</div>
  <div class="force-individual">
    <div class="force-sensor">
      <div class="label">Gauche</div>
      <div class="value" id="forceL">0.0</div>
    </div>
    <div class="force-sensor">
      <div class="label">Droite</div>
      <div class="value" id="forceR">0.0</div>
    </div>
  </div>
</div>

<!-- Session Timer -->
<div class="session-timer" id="sessionTimer">
  <span class="dot"></span> SESSION <span id="timerValue">00:00</span>
</div>

<!-- Controls -->
<div class="controls" id="controlsDefault">
  <button class="btn-session btn-tare" onclick="tareAll()">Tare</button>
  <button class="btn-session btn-start" id="btnStart" onclick="startSession()" disabled>▶ DÉMARRER SÉANCE</button>
</div>
<div class="controls" id="controlsRunning" style="display:none">
  <button class="btn-session btn-end" onclick="endSession()">⏹ FIN SÉANCE</button>
</div>

<!-- Chart -->
<div class="chart-container">
  <canvas id="liveChart"></canvas>
</div>

<!-- Current Sequence -->
<div class="current-seq" id="currentSeq">
  <div class="seq-title" id="seqTitle">⚡ Séquence 1 — Charge</div>
  <div class="stats-grid">
    <div class="stat-item"><div class="stat-label">Moy</div><div class="stat-value" id="seqAvg">0.0</div></div>
    <div class="stat-item"><div class="stat-label">Max</div><div class="stat-value" id="seqMax">0.0</div></div>
    <div class="stat-item"><div class="stat-label">Min</div><div class="stat-value" id="seqMin">0.0</div></div>
    <div class="stat-item"><div class="stat-label">Durée</div><div class="stat-value" id="seqDur">0s</div></div>
  </div>
</div>

<!-- History -->
<div class="history">
  <div class="history-title">Séquences</div>
  <div id="historyList"></div>
</div>

<!-- Summary Overlay -->
<div class="summary-overlay" id="summaryOverlay">
  <div class="summary-card" id="summaryContent"></div>
</div>

<div class="status-bar" id="statusBar">En attente de connexion...</div>

<script>
// ===== TINDEQ BLE CONFIG =====
const SERVICE_UUID = '7e4e1701-1ea6-40c9-9dcc-13d34ffead57';
const DATA_UUID    = '7e4e1702-1ea6-40c9-9dcc-13d34ffead57';
const CTRL_UUID    = '7e4e1703-1ea6-40c9-9dcc-13d34ffead57';

const CMD_TARE = 100;
const CMD_START_WEIGHT = 101;
const CMD_STOP_WEIGHT = 102;
const CMD_GET_BATTERY = 111;
const CMD_SLEEP = 110;

const RES_WEIGHT = 1;
const RES_CMD = 0;

// ===== STATE =====
const sensors = { L: null, R: null };
const clients = { L: null, R: null };
const ctrls = { L: null, R: null };
let forceL = 0, forceR = 0;
let sessionRunning = false;
let sessionStartTime = null;
let timerInterval = null;

// Sequence detection
const LOAD_THRESHOLD = 2.0; // kg - above this = load
const DEBOUNCE_MS = 500;    // ms before switching state
let isLoading = false;
let lastStateChange = 0;
let currentSequence = null;
let sequences = [];
let seqCounter = 0;

// Chart data
const chartData = [];
const CHART_WINDOW = 300; // ~30s at 10Hz

// ===== BLE CONNECTION =====
async function connectSensor(side) {
  const btn = document.getElementById(`btnConnect${side}`);
  const status = document.getElementById(`status${side}`);
  
  try {
    status.textContent = 'Recherche...';
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'Progressor' }],
      optionalServices: [SERVICE_UUID]
    });
    
    status.textContent = 'Connexion...';
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const dataChar = await service.getCharacteristic(DATA_UUID);
    const ctrlChar = await service.getCharacteristic(CTRL_UUID);
    
    sensors[side] = device;
    clients[side] = { server, service, dataChar, ctrlChar };
    ctrls[side] = ctrlChar;
    
    // Start notifications
    await dataChar.startNotifications();
    dataChar.addEventListener('characteristicvaluechanged', (e) => handleData(side, e));
    
    // Get battery
    await ctrlChar.writeValueWithResponse(new Uint8Array([CMD_GET_BATTERY]));
    
    btn.classList.add('connected');
    status.textContent = `✓ ${device.name}`;
    
    device.addEventListener('gattserverdisconnected', () => {
      btn.classList.remove('connected');
      status.textContent = 'Déconnecté';
      sensors[side] = null;
      clients[side] = null;
      updateStartBtn();
    });
    
    updateStartBtn();
    setStatus(`${side === 'L' ? 'Gauche' : 'Droite'} connecté: ${device.name}`);
    
  } catch(err) {
    status.textContent = 'Erreur';
    console.error(err);
    setStatus(`Erreur: ${err.message}`);
  }
}

function updateStartBtn() {
  const anyConnected = sensors.L || sensors.R;
  document.getElementById('btnStart').disabled = !anyConnected;
}

// ===== DATA HANDLING =====
function handleData(side, event) {
  const data = new Uint8Array(event.target.value.buffer);
  
  if (data[0] === RES_WEIGHT) {
    // Parse weight samples: 4 bytes float + 4 bytes timestamp per sample
    for (let i = 2; i < data.length; i += 8) {
      if (i + 8 > data.length + 1) break;
      const buf = new ArrayBuffer(4);
      const view = new DataView(buf);
      for (let j = 0; j < 4; j++) view.setUint8(j, data[i + j]);
      const weight = view.getFloat32(0, true); // little endian
      
      if (side === 'L') forceL = Math.max(0, weight);
      else forceR = Math.max(0, weight);
    }
    updateDisplay();
    
    if (sessionRunning) {
      processForce();
    }
  } else if (data[0] === RES_CMD) {
    // Battery response
    if (data.length >= 6) {
      const buf = new ArrayBuffer(4);
      const view = new DataView(buf);
      for (let j = 0; j < 4; j++) view.setUint8(j, data[2 + j]);
      const vdd = view.getUint32(0, true);
      document.getElementById('batteryInfo').textContent = `🔋 ${vdd}mV`;
    }
  }
}

function updateDisplay() {
  const total = forceL + forceR;
  document.getElementById('forceTotal').textContent = total.toFixed(1);
  document.getElementById('forceL').textContent = forceL.toFixed(1);
  document.getElementById('forceR').textContent = forceR.toFixed(1);
  
  // Animate color based on force
  const el = document.getElementById('forceTotal');
  if (total > 30) el.style.filter = 'brightness(1.3)';
  else el.style.filter = 'brightness(1)';
}

// ===== SESSION MANAGEMENT =====
async function startSession() {
  sessionRunning = true;
  sessionStartTime = Date.now();
  sequences = [];
  seqCounter = 0;
  currentSequence = null;
  isLoading = false;
  chartData.length = 0;
  document.getElementById('historyList').innerHTML = '';
  
  document.getElementById('controlsDefault').style.display = 'none';
  document.getElementById('controlsRunning').style.display = 'flex';
  document.getElementById('sessionTimer').classList.add('active');
  
  // Start weight measurement on both sensors
  for (const side of ['L', 'R']) {
    if (ctrls[side]) {
      try {
        await ctrls[side].writeValueWithResponse(new Uint8Array([CMD_START_WEIGHT]));
      } catch(e) { console.error(e); }
    }
  }
  
  timerInterval = setInterval(updateTimer, 1000);
  requestAnimationFrame(drawChart);
  setStatus('Séance en cours — tirez pour commencer !');
}

async function endSession() {
  sessionRunning = false;
  
  // Close current sequence
  if (currentSequence && currentSequence.samples.length > 0) {
    finalizeSequence();
  }
  
  // Stop measurements
  for (const side of ['L', 'R']) {
    if (ctrls[side]) {
      try {
        await ctrls[side].writeValueWithResponse(new Uint8Array([CMD_STOP_WEIGHT]));
      } catch(e) { console.error(e); }
    }
  }
  
  clearInterval(timerInterval);
  document.getElementById('controlsDefault').style.display = 'flex';
  document.getElementById('controlsRunning').style.display = 'none';
  document.getElementById('sessionTimer').classList.remove('active');
  document.getElementById('currentSeq').classList.remove('active');
  
  showSummary();
}

async function tareAll() {
  for (const side of ['L', 'R']) {
    if (ctrls[side]) {
      try {
        await ctrls[side].writeValueWithResponse(new Uint8Array([CMD_TARE]));
      } catch(e) { console.error(e); }
    }
  }
  setStatus('Tare effectuée ✓');
}

function updateTimer() {
  if (!sessionStartTime) return;
  const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timerValue').textContent = `${m}:${s}`;
}

// ===== SEQUENCE DETECTION =====
function processForce() {
  const total = forceL + forceR;
  const now = Date.now();
  
  // Push to chart
  chartData.push({ t: now, v: total, l: forceL, r: forceR });
  if (chartData.length > CHART_WINDOW) chartData.shift();
  
  const wasLoading = isLoading;
  const shouldBeLoading = total >= LOAD_THRESHOLD;
  
  // Debounce state transitions
  if (shouldBeLoading !== wasLoading) {
    if (now - lastStateChange > DEBOUNCE_MS) {
      isLoading = shouldBeLoading;
      lastStateChange = now;
      
      if (isLoading) {
        // Transition: rest → load
        if (currentSequence && !currentSequence.isLoad) {
          finalizeSequence();
        }
        startNewSequence(true);
      } else {
        // Transition: load → rest
        if (currentSequence && currentSequence.isLoad) {
          finalizeSequence();
        }
        startNewSequence(false);
      }
    }
  }
  
  // Add sample to current sequence
  if (currentSequence) {
    currentSequence.samples.push({ t: now, v: total, l: forceL, r: forceR });
    updateCurrentSeqStats();
  }
}

function startNewSequence(isLoad) {
  seqCounter++;
  currentSequence = {
    id: seqCounter,
    isLoad,
    startTime: Date.now(),
    samples: [],
  };
  
  const el = document.getElementById('currentSeq');
  el.classList.add('active');
  const title = document.getElementById('seqTitle');
  title.textContent = isLoad 
    ? `⚡ Séquence ${Math.ceil(seqCounter/2)} — Charge`
    : `💤 Repos`;
  title.style.color = isLoad ? 'var(--accent)' : 'var(--text-dim)';
}

function finalizeSequence() {
  if (!currentSequence || currentSequence.samples.length === 0) return;
  
  const seq = currentSequence;
  const values = seq.samples.map(s => s.v);
  const duration = (seq.samples[seq.samples.length-1].t - seq.startTime) / 1000;
  
  seq.stats = {
    avg: values.reduce((a,b) => a+b, 0) / values.length,
    max: Math.max(...values),
    min: Math.min(...values),
    duration,
    leftAvg: seq.samples.map(s => s.l).reduce((a,b) => a+b, 0) / seq.samples.length,
    rightAvg: seq.samples.map(s => s.r).reduce((a,b) => a+b, 0) / seq.samples.length,
  };
  
  sequences.push(seq);
  addSequenceCard(seq);
  currentSequence = null;
}

function updateCurrentSeqStats() {
  if (!currentSequence || currentSequence.samples.length === 0) return;
  const values = currentSequence.samples.map(s => s.v);
  const dur = (Date.now() - currentSequence.startTime) / 1000;
  
  document.getElementById('seqAvg').textContent = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(1);
  document.getElementById('seqMax').textContent = Math.max(...values).toFixed(1);
  document.getElementById('seqMin').textContent = Math.min(...values).toFixed(1);
  document.getElementById('seqDur').textContent = dur.toFixed(0) + 's';
}

function addSequenceCard(seq) {
  if (!seq.stats) return;
  const s = seq.stats;
  const card = document.createElement('div');
  card.className = `seq-card ${seq.isLoad ? '' : 'rest'}`;
  
  if (seq.isLoad) {
    card.innerHTML = `
      <div class="seq-header">
        <span class="seq-name">⚡ Charge #${Math.ceil(seq.id/2)}</span>
        <span class="seq-duration">${s.duration.toFixed(1)}s</span>
      </div>
      <div class="seq-stats">
        <span><span class="lbl">Moy:</span> ${s.avg.toFixed(1)}kg</span>
        <span><span class="lbl">Max:</span> ${s.max.toFixed(1)}kg</span>
        <span><span class="lbl">G:</span> ${s.leftAvg.toFixed(1)} <span class="lbl">D:</span> ${s.rightAvg.toFixed(1)}</span>
      </div>`;
  } else {
    card.innerHTML = `
      <div class="seq-header">
        <span class="seq-name">💤 Repos</span>
        <span class="seq-duration">${s.duration.toFixed(1)}s</span>
      </div>`;
  }
  
  document.getElementById('historyList').prepend(card);
}

// ===== CHART =====
function drawChart() {
  const canvas = document.getElementById('liveChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  
  ctx.clearRect(0, 0, w, h);
  
  if (chartData.length < 2) {
    if (sessionRunning) requestAnimationFrame(drawChart);
    return;
  }
  
  const maxForce = Math.max(20, ...chartData.map(d => d.v)) * 1.1;
  
  // Grid lines
  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (i / 4) * h;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  
  // Threshold line
  const threshY = h - (LOAD_THRESHOLD / maxForce) * h;
  ctx.strokeStyle = 'rgba(255,107,53,0.3)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, threshY); ctx.lineTo(w, threshY); ctx.stroke();
  ctx.setLineDash([]);
  
  // Total force line
  ctx.beginPath();
  ctx.strokeStyle = '#ff6b35';
  ctx.lineWidth = 2;
  chartData.forEach((d, i) => {
    const x = (i / (CHART_WINDOW - 1)) * w;
    const y = h - (d.v / maxForce) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // Fill
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(255,107,53,0.3)');
  grad.addColorStop(1, 'rgba(255,107,53,0)');
  ctx.fillStyle = grad;
  ctx.fill();
  
  // Left sensor (thin line)
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(24,255,255,0.4)';
  ctx.lineWidth = 1;
  chartData.forEach((d, i) => {
    const x = (i / (CHART_WINDOW - 1)) * w;
    const y = h - (d.l / maxForce) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  // Right sensor (thin line)
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(179,136,255,0.4)';
  ctx.lineWidth = 1;
  chartData.forEach((d, i) => {
    const x = (i / (CHART_WINDOW - 1)) * w;
    const y = h - (d.r / maxForce) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  if (sessionRunning) requestAnimationFrame(drawChart);
}

// ===== SUMMARY =====
function showSummary() {
  const loadSeqs = sequences.filter(s => s.isLoad && s.stats);
  const restSeqs = sequences.filter(s => !s.isLoad && s.stats);
  
  if (loadSeqs.length === 0) {
    setStatus('Aucune séquence de charge détectée.');
    return;
  }
  
  const totalDuration = (Date.now() - sessionStartTime) / 1000;
  const totalLoadTime = loadSeqs.reduce((a, s) => a + s.stats.duration, 0);
  const totalRestTime = restSeqs.reduce((a, s) => a + s.stats.duration, 0);
  const allMaxes = loadSeqs.map(s => s.stats.max);
  const allAvgs = loadSeqs.map(s => s.stats.avg);
  const globalMax = Math.max(...allMaxes);
  const globalAvg = allAvgs.reduce((a,b) => a+b, 0) / allAvgs.length;
  
  // Performance score: consistency + endurance
  const consistency = allAvgs.length > 1 
    ? 1 - (standardDev(allAvgs) / globalAvg) 
    : 1;
  const endurance = loadSeqs.length > 2 
    ? allAvgs[allAvgs.length-1] / allAvgs[0] 
    : 1;
  const perfScore = Math.round(Math.min(100, (consistency * 50 + Math.min(1, endurance) * 50)));
  
  const el = document.getElementById('summaryContent');
  el.innerHTML = `
    <h2>📊 Résumé Séance</h2>
    <div class="subtitle">Durée totale: ${formatTime(totalDuration)}</div>
    
    <div class="perf-score">
      <div class="score-label">Score Performance</div>
      <div class="score-value">${perfScore}</div>
      <div class="score-label">${perfScore >= 80 ? '🔥 Excellent' : perfScore >= 60 ? '💪 Bon' : '📈 À améliorer'}</div>
    </div>
    
    <div class="summary-stats">
      <div class="summary-stat">
        <div class="s-label">Force Max</div>
        <div class="s-value" style="color:var(--accent)">${globalMax.toFixed(1)}<small>kg</small></div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Moy. Charges</div>
        <div class="s-value" style="color:var(--cyan)">${globalAvg.toFixed(1)}<small>kg</small></div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Temps Charge</div>
        <div class="s-value" style="color:var(--green)">${formatTime(totalLoadTime)}</div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Temps Repos</div>
        <div class="s-value" style="color:var(--text-dim)">${formatTime(totalRestTime)}</div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Nb Séquences</div>
        <div class="s-value">${loadSeqs.length}</div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Ratio Charge</div>
        <div class="s-value">${Math.round(totalLoadTime / (totalLoadTime + totalRestTime) * 100)}%</div>
      </div>
    </div>
    
    <div class="summary-sequences">
      <h3>Détail séquences</h3>
      ${loadSeqs.map((s, i) => `
        <div class="seq-card" style="border-left-color: ${i === 0 ? 'var(--green)' : allAvgs[i] >= allAvgs[0]*0.9 ? 'var(--accent)' : 'var(--red)'}">
          <div class="seq-header">
            <span class="seq-name">Charge #${i+1}</span>
            <span class="seq-duration">${s.stats.duration.toFixed(1)}s</span>
          </div>
          <div class="seq-stats">
            <span><span class="lbl">Moy:</span> ${s.stats.avg.toFixed(1)}kg</span>
            <span><span class="lbl">Max:</span> ${s.stats.max.toFixed(1)}kg</span>
            <span><span class="lbl">G:</span>${s.stats.leftAvg.toFixed(1)} <span class="lbl">D:</span>${s.stats.rightAvg.toFixed(1)}</span>
          </div>
        </div>
      `).join('')}
    </div>
    
    <button class="btn-close-summary" onclick="closeSummary()">FERMER</button>
  `;
  
  document.getElementById('summaryOverlay').classList.add('active');
}

function closeSummary() {
  document.getElementById('summaryOverlay').classList.remove('active');
}

// ===== UTILS =====
function standardDev(arr) {
  const avg = arr.reduce((a,b) => a+b, 0) / arr.length;
  return Math.sqrt(arr.reduce((a,b) => a + (b-avg)**2, 0) / arr.length);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  return m > 0 ? `${m}m${String(s).padStart(2,'0')}s` : `${s}s`;
}

function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

// Check Web Bluetooth support
if (!navigator.bluetooth) {
  setStatus('⚠️ Web Bluetooth non supporté. Utilise Chrome sur Android.');
  document.querySelectorAll('.connect-btn').forEach(b => b.disabled = true);
} else {
  setStatus('Prêt — connecte tes capteurs Tindeq');
}
