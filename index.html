<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ClimBetter — Force Lab</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --accent: #ff6b35;
    --accent2: #ff9f1c;
    --green: #00e676;
    --red: #ff5252;
    --blue: #448aff;
    --purple: #b388ff;
    --cyan: #18ffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* Header */
  .header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #12121a, var(--bg));
  }
  .logo {
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .battery-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Sync indicator */
  .sync-indicator {
    display: none;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .sync-indicator.visible { display: flex; }
  .sync-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
  }
  .sync-indicator.syncing .sync-dot { background: var(--accent2); animation: blink 0.5s infinite; }
  .sync-indicator.error .sync-dot { background: var(--red); }

  /* Login screen */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    padding: 40px 20px;
    text-align: center;
  }
  .login-screen .login-title {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 8px;
  }
  .login-screen .login-subtitle {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 32px;
    max-width: 300px;
  }
  .btn-login {
    padding: 16px 48px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-family: 'Outfit', sans-serif;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-login:active { transform: scale(0.96); }
  .btn-login:disabled { opacity: 0.5; cursor: wait; }

  /* User bar */
  .user-bar {
    display: none;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .user-bar.visible { display: flex; }
  .user-bar .user-name { font-weight: 600; }
  .user-bar .user-role {
    font-size: 11px;
    color: var(--accent);
    background: rgba(255,107,53,0.15);
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
  }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    cursor: pointer;
  }

  /* App content (hidden until logged in) */
  .app-content { display: none; }
  .app-content.visible { display: block; }

  /* Connection Panel */
  .connect-panel {
    padding: 16px 20px;
    display: flex;
    gap: 12px;
  }
  .connect-btn {
    flex: 1;
    padding: 14px 12px;
    border: 2px dashed var(--border);
    border-radius: 14px;
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
  }
  .connect-btn.connected {
    border: 2px solid var(--green);
    color: var(--green);
    background: rgba(0, 230, 118, 0.08);
  }
  .connect-btn .icon { font-size: 24px; display: block; margin-bottom: 4px; }
  .connect-btn .status { font-size: 11px; font-weight: 400; opacity: 0.7; }

  /* Live Force Display */
  .force-display {
    padding: 20px;
    text-align: center;
  }
  .force-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: all 0.15s;
  }
  .force-unit {
    font-size: 20px;
    color: var(--text-dim);
    margin-top: 2px;
    font-weight: 300;
  }
  .force-individual {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 12px;
  }
  .force-sensor {
    text-align: center;
  }
  .force-sensor .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .force-sensor .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--cyan);
  }

  /* Session Controls */
  .controls {
    padding: 0 20px 16px;
    display: flex;
    gap: 12px;
  }
  .btn-session {
    flex: 1;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--green), #00c853);
    color: #000;
  }
  .btn-stop {
    background: linear-gradient(135deg, var(--red), #d50000);
    color: #fff;
  }
  .btn-end {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
  }
  .btn-tare {
    width: 60px;
    flex: none;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 600;
  }
  .btn-session:active { transform: scale(0.96); }
  .btn-session:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Canvas Chart */
  .chart-container {
    padding: 0 20px;
    margin-bottom: 12px;
  }
  canvas#liveChart {
    width: 100%;
    height: 120px;
    border-radius: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  /* Current Sequence Stats */
  .current-seq {
    margin: 0 20px 12px;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    display: none;
  }
  .current-seq.active { display: block; }
  .current-seq .seq-title {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .stat-item {
    text-align: center;
  }
  .stat-item .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stat-item .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  /* Sequence History */
  .history {
    padding: 0 20px 20px;
  }
  .history-title {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .seq-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 3px solid var(--accent);
    animation: slideIn 0.3s ease;
  }
  .seq-card.rest {
    border-left-color: var(--text-dim);
    opacity: 0.6;
  }
  .seq-card .seq-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .seq-card .seq-name {
    font-weight: 700;
    font-size: 14px;
  }
  .seq-card .seq-duration {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .seq-card .seq-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
  }
  .seq-card .seq-stats span {
    font-family: 'JetBrains Mono', monospace;
  }
  .seq-card .seq-stats .lbl { color: var(--text-dim); }

  /* Past sessions */
  .past-sessions {
    padding: 0 20px 100px;
  }
  .past-sessions-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 12px 0;
    border-top: 1px solid var(--border);
  }
  .past-sessions-header h3 {
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .past-sessions-header .toggle {
    color: var(--text-dim);
    font-size: 18px;
    transition: transform 0.3s;
  }
  .past-sessions-header.open .toggle { transform: rotate(180deg); }
  .past-sessions-list { display: none; }
  .past-sessions-list.open { display: block; }
  .past-session-card {
    background: var(--surface);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .past-session-card:hover { border-color: var(--accent); }
  .past-session-card .ps-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .past-session-card .ps-title { font-weight: 700; font-size: 14px; }
  .past-session-card .ps-date { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .past-session-card .ps-stats {
    display: flex;
    gap: 16px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .past-session-card .ps-stats .lbl { color: var(--text-dim); }
  .past-session-card .ps-score {
    color: var(--accent);
    font-weight: 700;
  }

  /* Summary Overlay */
  .summary-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    display: none;
    overflow-y: auto;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  .summary-overlay.active { display: block; }
  .summary-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 24px;
    max-width: 500px;
    margin: 0 auto;
    border: 1px solid var(--border);
  }
  .summary-card h2 {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 4px;
  }
  .summary-card .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .perf-score {
    text-align: center;
    padding: 20px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(255,159,28,0.1));
    border-radius: 16px;
    border: 1px solid rgba(255,107,53,0.2);
  }
  .perf-score .score-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .perf-score .score-label {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .server-badge {
    display: inline-block;
    font-size: 10px;
    color: var(--green);
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.3);
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .summary-stat {
    background: var(--surface2);
    padding: 14px;
    border-radius: 12px;
    text-align: center;
  }
  .summary-stat .s-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .summary-stat .s-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
  }
  .summary-sequences {
    margin-top: 16px;
  }
  .summary-sequences h3 {
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .btn-close-summary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: #000;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-top: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Session Timer */
  .session-timer {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: var(--text-dim);
    padding: 4px 0 12px;
    display: none;
  }
  .session-timer.active { display: block; }
  .session-timer .dot {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    margin-right: 6px;
    animation: blink 1s infinite;
  }

  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Status bar */
  .status-bar {
    padding: 8px 20px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Debug simulator */
  .debug-panel {
    display: none;
    padding: 8px 20px;
    text-align: center;
  }
  .debug-panel.visible { display: block; }
  .btn-simulate {
    padding: 10px 20px;
    border: 1px dashed var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Clim<span>Better</span> <small style="font-weight:300;font-size:12px;color:var(--text-dim)">Force Lab</small></div>
  <div class="header-right">
    <div class="sync-indicator" id="syncIndicator">
      <div class="sync-dot"></div>
      <span id="syncText">Sync OK</span>
    </div>
    <div class="battery-info" id="batteryInfo"></div>
  </div>
</div>

<!-- User bar -->
<div class="user-bar" id="userBar">
  <div>
    <span class="user-name" id="userName"></span>
    <span class="user-role" id="userRole"></span>
  </div>
  <button class="btn-logout" onclick="logout()">Deconnexion</button>
</div>

<!-- Login screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-title">Clim<span style="color:var(--accent)">Better</span></div>
  <div class="login-subtitle">Connecte-toi pour enregistrer et analyser tes seances de force</div>
  <button class="btn-login" id="btnLogin" onclick="login()">Se connecter</button>
  <div style="margin-top:16px;font-size:12px;color:var(--text-dim)" id="loginStatus"></div>
</div>

<!-- App content (hidden until logged in) -->
<div class="app-content" id="appContent">

  <!-- Connection -->
  <div class="connect-panel">
    <button class="connect-btn" id="btnConnectL" onclick="connectSensor('L')">
      <span class="icon">&#129306;</span>
      Main Gauche
      <div class="status" id="statusL">Non connecte</div>
    </button>
    <button class="connect-btn" id="btnConnectR" onclick="connectSensor('R')">
      <span class="icon">&#9995;</span>
      Main Droite
      <div class="status" id="statusR">Non connecte</div>
    </button>
  </div>

  <!-- Debug simulator (visible only with ?debug=1) -->
  <div class="debug-panel" id="debugPanel">
    <button class="btn-simulate" onclick="startSimulation()">Simuler capteur (10s)</button>
  </div>

  <!-- Live Force -->
  <div class="force-display">
    <div class="force-total" id="forceTotal">0.0</div>
    <div class="force-unit">kg (total)</div>
    <div class="force-individual">
      <div class="force-sensor">
        <div class="label">Gauche</div>
        <div class="value" id="forceL">0.0</div>
      </div>
      <div class="force-sensor">
        <div class="label">Droite</div>
        <div class="value" id="forceR">0.0</div>
      </div>
    </div>
  </div>

  <!-- Session Timer -->
  <div class="session-timer" id="sessionTimer">
    <span class="dot"></span> SESSION <span id="timerValue">00:00</span>
  </div>

  <!-- Controls -->
  <div class="controls" id="controlsDefault">
    <button class="btn-session btn-tare" onclick="tareAll()">Tare</button>
    <button class="btn-session btn-start" id="btnStart" onclick="startSession()" disabled>DEMARRER SEANCE</button>
  </div>
  <div class="controls" id="controlsRunning" style="display:none">
    <button class="btn-session btn-end" onclick="endSession()">FIN SEANCE</button>
  </div>

  <!-- Chart -->
  <div class="chart-container">
    <canvas id="liveChart"></canvas>
  </div>

  <!-- Current Sequence -->
  <div class="current-seq" id="currentSeq">
    <div class="seq-title" id="seqTitle">Sequence 1 -- Charge</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-label">Moy</div><div class="stat-value" id="seqAvg">0.0</div></div>
      <div class="stat-item"><div class="stat-label">Max</div><div class="stat-value" id="seqMax">0.0</div></div>
      <div class="stat-item"><div class="stat-label">Min</div><div class="stat-value" id="seqMin">0.0</div></div>
      <div class="stat-item"><div class="stat-label">Duree</div><div class="stat-value" id="seqDur">0s</div></div>
    </div>
  </div>

  <!-- History -->
  <div class="history">
    <div class="history-title">Sequences</div>
    <div id="historyList"></div>
  </div>

  <!-- Past Sessions -->
  <div class="past-sessions">
    <div class="past-sessions-header" id="pastSessionsHeader" onclick="togglePastSessions()">
      <h3>Mes seances precedentes</h3>
      <span class="toggle">&#9660;</span>
    </div>
    <div class="past-sessions-list" id="pastSessionsList"></div>
  </div>
</div>

<!-- Summary Overlay -->
<div class="summary-overlay" id="summaryOverlay">
  <div class="summary-card" id="summaryContent"></div>
</div>

<div class="status-bar" id="statusBar">Chargement...</div>

<script>
// ===== CONFIG =====
const API_BASE = 'https://api.climbetter.com/api/v1';
const KC_BASE = 'https://auth.climbetter.com/realms/climbetter/protocol/openid-connect';
const KC_CLIENT_ID = 'mobile-app';
const REDIRECT_URI = window.location.origin + window.location.pathname;

// ===== AUTH STATE (in memory only) =====
let accessToken = null;
let refreshToken = null;
let tokenExpiry = 0;
let refreshTimer = null;
let currentUser = null;

// ===== AUTH — PKCE FLOW =====
function generateCodeVerifier() {
  const array = new Uint8Array(64);
  crypto.getRandomValues(array);
  return base64urlEncode(array);
}

async function generateCodeChallenge(verifier) {
  const encoder = new TextEncoder();
  const data = encoder.encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return base64urlEncode(new Uint8Array(digest));
}

function base64urlEncode(bytes) {
  let str = '';
  for (const b of bytes) str += String.fromCharCode(b);
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function login() {
  const btnLogin = document.getElementById('btnLogin');
  btnLogin.disabled = true;
  document.getElementById('loginStatus').textContent = 'Redirection vers Keycloak...';

  const codeVerifier = generateCodeVerifier();
  sessionStorage.setItem('pkce_code_verifier', codeVerifier);

  const codeChallenge = await generateCodeChallenge(codeVerifier);

  const params = new URLSearchParams({
    client_id: KC_CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'code',
    scope: 'openid profile email',
    code_challenge: codeChallenge,
    code_challenge_method: 'S256',
  });

  window.location.href = `${KC_BASE}/auth?${params}`;
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return false;

  const codeVerifier = sessionStorage.getItem('pkce_code_verifier');
  if (!codeVerifier) {
    console.error('No code_verifier in sessionStorage');
    return false;
  }
  sessionStorage.removeItem('pkce_code_verifier');

  // Clean URL
  window.history.replaceState({}, document.title, window.location.pathname);

  try {
    const resp = await fetch(`${KC_BASE}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: KC_CLIENT_ID,
        code,
        redirect_uri: REDIRECT_URI,
        code_verifier: codeVerifier,
      }),
    });

    if (!resp.ok) {
      const err = await resp.text();
      console.error('Token exchange failed:', err);
      return false;
    }

    const data = await resp.json();
    setTokens(data);
    return true;
  } catch (e) {
    console.error('Token exchange error:', e);
    return false;
  }
}

function setTokens(data) {
  accessToken = data.access_token;
  refreshToken = data.refresh_token;
  tokenExpiry = Date.now() + (data.expires_in - 30) * 1000;

  // Schedule refresh 30s before expiry
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(doRefreshToken, Math.max((data.expires_in - 30) * 1000, 10000));
}

async function doRefreshToken() {
  if (!refreshToken) return;

  try {
    const resp = await fetch(`${KC_BASE}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'refresh_token',
        client_id: KC_CLIENT_ID,
        refresh_token: refreshToken,
      }),
    });

    if (!resp.ok) {
      console.error('Token refresh failed');
      logout();
      return;
    }

    const data = await resp.json();
    setTokens(data);
  } catch (e) {
    console.error('Token refresh error:', e);
  }
}

function getAuthHeaders() {
  return { 'Authorization': `Bearer ${accessToken}` };
}

function logout() {
  accessToken = null;
  refreshToken = null;
  tokenExpiry = 0;
  currentUser = null;
  if (refreshTimer) clearInterval(refreshTimer);

  const logoutUrl = `${KC_BASE}/logout?` + new URLSearchParams({
    client_id: KC_CLIENT_ID,
    post_logout_redirect_uri: REDIRECT_URI,
  });
  window.location.href = logoutUrl;
}

function decodeJwtPayload(token) {
  const parts = token.split('.');
  if (parts.length !== 3) return null;
  const payload = parts[1].replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(atob(payload));
}

// ===== READINGS BUFFER =====
class ReadingsBuffer {
  constructor(sessionId, flushInterval = 2000) {
    this.buffer = [];
    this.sessionId = sessionId;
    this.flushTimer = null;
    this.syncStatus = 'idle';
    this.totalSent = 0;
    this.totalBuffered = 0;
    this.flushing = false;
  }

  add(reading) {
    this.buffer.push(reading);
    this.totalBuffered++;
  }

  start(flushInterval = 2000) {
    this.flushTimer = setInterval(() => this.flush(), flushInterval);
    this.updateIndicator();
  }

  async flush() {
    if (this.buffer.length === 0 || this.flushing) return;
    this.flushing = true;

    const batch = this.buffer.splice(0, this.buffer.length);
    this.syncStatus = 'syncing';
    this.updateIndicator();

    try {
      await api.sendReadings(this.sessionId, batch);
      this.totalSent += batch.length;
      this.syncStatus = 'idle';
    } catch (e) {
      console.error('Flush error:', e);
      // Put back in buffer for retry
      this.buffer.unshift(...batch);
      this.syncStatus = 'error';
    }

    this.flushing = false;
    this.updateIndicator();
  }

  async stop() {
    if (this.flushTimer) clearInterval(this.flushTimer);
    this.flushTimer = null;
    await this.flush();
  }

  updateIndicator() {
    const el = document.getElementById('syncIndicator');
    const text = document.getElementById('syncText');
    el.classList.remove('syncing', 'error');

    if (this.syncStatus === 'syncing') {
      el.classList.add('syncing');
      text.textContent = `Envoi... (${this.buffer.length} en attente)`;
    } else if (this.syncStatus === 'error') {
      el.classList.add('error');
      text.textContent = `Erreur sync (${this.buffer.length} en attente)`;
    } else {
      text.textContent = `Sync OK (${this.totalSent} envoyes)`;
    }
  }
}

let readingsBuffer = null;
let apiSessionId = null;

// ===== TINDEQ BLE CONFIG =====
const SERVICE_UUID = '7e4e1701-1ea6-40c9-9dcc-13d34ffead57';
const DATA_UUID    = '7e4e1702-1ea6-40c9-9dcc-13d34ffead57';
const CTRL_UUID    = '7e4e1703-1ea6-40c9-9dcc-13d34ffead57';

const CMD_TARE = 100;
const CMD_START_WEIGHT = 101;
const CMD_STOP_WEIGHT = 102;
const CMD_GET_BATTERY = 111;
const CMD_SLEEP = 110;

const RES_WEIGHT = 1;
const RES_CMD = 0;

// ===== STATE =====
const sensors = { L: null, R: null };
const clients = { L: null, R: null };
const ctrls = { L: null, R: null };
let forceL = 0, forceR = 0;
let sessionRunning = false;
let sessionStartTime = null;
let sessionStartIso = null;
let timerInterval = null;
let simulating = false;

// Sequence detection
const LOAD_THRESHOLD = 2.0;
const DEBOUNCE_MS = 500;
let isLoading = false;
let lastStateChange = 0;
let currentSequence = null;
let sequences = [];
let seqCounter = 0;

// Chart data
const chartData = [];
const CHART_WINDOW = 300;

// ===== BLE CONNECTION =====
async function connectSensor(side) {
  const btn = document.getElementById(`btnConnect${side}`);
  const status = document.getElementById(`status${side}`);

  try {
    status.textContent = 'Recherche...';
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'Progressor' }],
      optionalServices: [SERVICE_UUID]
    });

    status.textContent = 'Connexion...';
    const server = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    const dataChar = await service.getCharacteristic(DATA_UUID);
    const ctrlChar = await service.getCharacteristic(CTRL_UUID);

    sensors[side] = device;
    clients[side] = { server, service, dataChar, ctrlChar };
    ctrls[side] = ctrlChar;

    await dataChar.startNotifications();
    dataChar.addEventListener('characteristicvaluechanged', (e) => handleData(side, e));

    await ctrlChar.writeValueWithResponse(new Uint8Array([CMD_GET_BATTERY]));

    btn.classList.add('connected');
    status.textContent = `${device.name}`;

    device.addEventListener('gattserverdisconnected', () => {
      btn.classList.remove('connected');
      status.textContent = 'Deconnecte';
      sensors[side] = null;
      clients[side] = null;
      updateStartBtn();
    });

    updateStartBtn();
    setStatus(`${side === 'L' ? 'Gauche' : 'Droite'} connecte: ${device.name}`);

  } catch(err) {
    status.textContent = 'Erreur';
    console.error(err);
    setStatus(`Erreur: ${err.message}`);
  }
}

function updateStartBtn() {
  const anyConnected = sensors.L || sensors.R || simulating;
  document.getElementById('btnStart').disabled = !anyConnected;
}

// ===== DATA HANDLING =====
function handleData(side, event) {
  const data = new Uint8Array(event.target.value.buffer);

  if (data[0] === RES_WEIGHT) {
    for (let i = 2; i < data.length; i += 8) {
      if (i + 8 > data.length + 1) break;
      const buf = new ArrayBuffer(4);
      const view = new DataView(buf);
      for (let j = 0; j < 4; j++) view.setUint8(j, data[i + j]);
      const weight = view.getFloat32(0, true);

      if (side === 'L') forceL = Math.max(0, weight);
      else forceR = Math.max(0, weight);
    }
    updateDisplay();

    if (sessionRunning) {
      processForce();
    }
  } else if (data[0] === RES_CMD) {
    if (data.length >= 6) {
      const buf = new ArrayBuffer(4);
      const view = new DataView(buf);
      for (let j = 0; j < 4; j++) view.setUint8(j, data[2 + j]);
      const vdd = view.getUint32(0, true);
      document.getElementById('batteryInfo').textContent = `${vdd}mV`;
    }
  }
}

function updateDisplay() {
  const total = forceL + forceR;
  document.getElementById('forceTotal').textContent = total.toFixed(1);
  document.getElementById('forceL').textContent = forceL.toFixed(1);
  document.getElementById('forceR').textContent = forceR.toFixed(1);

  const el = document.getElementById('forceTotal');
  if (total > 30) el.style.filter = 'brightness(1.3)';
  else el.style.filter = 'brightness(1)';
}

// ===== SESSION MANAGEMENT =====
async function startSession() {
  const btnStart = document.getElementById('btnStart');
  btnStart.disabled = true;

  const sensorCount = (sensors.L ? 1 : 0) + (sensors.R ? 1 : 0) + (simulating ? 2 : 0);

  try {
    // Create session on API
    sessionStartIso = new Date().toISOString();
    const session = await api.createSession({
      client_id: crypto.randomUUID(),
      type: 'free_session',
      title: `Seance ${new Date().toLocaleDateString('fr-FR')}`,
      location_type: 'home',
      started_at: sessionStartIso,
      sensor_count: Math.min(sensorCount, 2),
      force_threshold_kg: LOAD_THRESHOLD,
      sample_rate_hz: 80,
    });
    apiSessionId = session.id;

    // Start readings buffer
    readingsBuffer = new ReadingsBuffer(apiSessionId);
    readingsBuffer.start(2000);
    document.getElementById('syncIndicator').classList.add('visible');

    setStatus(`Seance creee (${apiSessionId.substring(0, 8)}...)`);
  } catch (e) {
    console.error('Failed to create session:', e);
    setStatus(`Erreur creation seance: ${e.message}`);
    btnStart.disabled = false;
    return;
  }

  sessionRunning = true;
  sessionStartTime = Date.now();
  sequences = [];
  seqCounter = 0;
  currentSequence = null;
  isLoading = false;
  chartData.length = 0;
  document.getElementById('historyList').innerHTML = '';

  document.getElementById('controlsDefault').style.display = 'none';
  document.getElementById('controlsRunning').style.display = 'flex';
  document.getElementById('sessionTimer').classList.add('active');

  for (const side of ['L', 'R']) {
    if (ctrls[side]) {
      try {
        await ctrls[side].writeValueWithResponse(new Uint8Array([CMD_START_WEIGHT]));
      } catch(e) { console.error(e); }
    }
  }

  timerInterval = setInterval(updateTimer, 1000);
  requestAnimationFrame(drawChart);
  setStatus('Seance en cours -- tirez pour commencer !');
}

async function endSession() {
  sessionRunning = false;

  if (currentSequence && currentSequence.samples.length > 0) {
    finalizeSequence();
  }

  for (const side of ['L', 'R']) {
    if (ctrls[side]) {
      try {
        await ctrls[side].writeValueWithResponse(new Uint8Array([CMD_STOP_WEIGHT]));
      } catch(e) { console.error(e); }
    }
  }

  clearInterval(timerInterval);
  document.getElementById('controlsDefault').style.display = 'flex';
  document.getElementById('controlsRunning').style.display = 'none';
  document.getElementById('sessionTimer').classList.remove('active');
  document.getElementById('currentSeq').classList.remove('active');

  // Stop buffer and flush remaining
  let serverStats = null;
  if (readingsBuffer && apiSessionId) {
    setStatus('Envoi des dernieres donnees...');
    await readingsBuffer.stop();

    try {
      const endResult = await api.endSession(apiSessionId, {
        ended_at: new Date().toISOString(),
        rating: null,
        perceived_effort: null,
      });
      serverStats = endResult.stats;
      setStatus('Stats calculees par le serveur');
    } catch (e) {
      console.error('End session error:', e);
      setStatus(`Erreur fin de seance: ${e.message}`);
    }
  }

  showSummary(serverStats);

  // Refresh past sessions
  loadPastSessions();
}

async function tareAll() {
  for (const side of ['L', 'R']) {
    if (ctrls[side]) {
      try {
        await ctrls[side].writeValueWithResponse(new Uint8Array([CMD_TARE]));
      } catch(e) { console.error(e); }
    }
  }
  setStatus('Tare effectuee');
}

function updateTimer() {
  if (!sessionStartTime) return;
  const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
  const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const s = String(elapsed % 60).padStart(2, '0');
  document.getElementById('timerValue').textContent = `${m}:${s}`;
}

// ===== SEQUENCE DETECTION =====
function processForce() {
  const total = forceL + forceR;
  const now = Date.now();

  chartData.push({ t: now, v: total, l: forceL, r: forceR });
  if (chartData.length > CHART_WINDOW) chartData.shift();

  // Buffer reading for API
  if (readingsBuffer) {
    if (forceL > 0 || sensors.L || simulating) {
      readingsBuffer.add({
        time: new Date().toISOString(),
        sensor_position: 'left',
        force_kg: parseFloat(forceL.toFixed(2)),
        rfd_kgs: 0,
        quality: 1.0,
      });
    }
    if (forceR > 0 || sensors.R || simulating) {
      readingsBuffer.add({
        time: new Date().toISOString(),
        sensor_position: 'right',
        force_kg: parseFloat(forceR.toFixed(2)),
        rfd_kgs: 0,
        quality: 1.0,
      });
    }
  }

  const wasLoading = isLoading;
  const shouldBeLoading = total >= LOAD_THRESHOLD;

  if (shouldBeLoading !== wasLoading) {
    if (now - lastStateChange > DEBOUNCE_MS) {
      isLoading = shouldBeLoading;
      lastStateChange = now;

      if (isLoading) {
        if (currentSequence && !currentSequence.isLoad) {
          finalizeSequence();
        }
        startNewSequence(true);
      } else {
        if (currentSequence && currentSequence.isLoad) {
          finalizeSequence();
        }
        startNewSequence(false);
      }
    }
  }

  if (currentSequence) {
    currentSequence.samples.push({ t: now, v: total, l: forceL, r: forceR });
    updateCurrentSeqStats();
  }
}

function startNewSequence(isLoad) {
  seqCounter++;
  currentSequence = {
    id: seqCounter,
    isLoad,
    startTime: Date.now(),
    samples: [],
  };

  const el = document.getElementById('currentSeq');
  el.classList.add('active');
  const title = document.getElementById('seqTitle');
  title.textContent = isLoad
    ? `Sequence ${Math.ceil(seqCounter/2)} -- Charge`
    : `Repos`;
  title.style.color = isLoad ? 'var(--accent)' : 'var(--text-dim)';
}

function finalizeSequence() {
  if (!currentSequence || currentSequence.samples.length === 0) return;

  const seq = currentSequence;
  const values = seq.samples.map(s => s.v);
  const duration = (seq.samples[seq.samples.length-1].t - seq.startTime) / 1000;

  seq.stats = {
    avg: values.reduce((a,b) => a+b, 0) / values.length,
    max: Math.max(...values),
    min: Math.min(...values),
    duration,
    leftAvg: seq.samples.map(s => s.l).reduce((a,b) => a+b, 0) / seq.samples.length,
    rightAvg: seq.samples.map(s => s.r).reduce((a,b) => a+b, 0) / seq.samples.length,
  };

  sequences.push(seq);
  addSequenceCard(seq);
  currentSequence = null;
}

function updateCurrentSeqStats() {
  if (!currentSequence || currentSequence.samples.length === 0) return;
  const values = currentSequence.samples.map(s => s.v);
  const dur = (Date.now() - currentSequence.startTime) / 1000;

  document.getElementById('seqAvg').textContent = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(1);
  document.getElementById('seqMax').textContent = Math.max(...values).toFixed(1);
  document.getElementById('seqMin').textContent = Math.min(...values).toFixed(1);
  document.getElementById('seqDur').textContent = dur.toFixed(0) + 's';
}

function addSequenceCard(seq) {
  if (!seq.stats) return;
  const s = seq.stats;
  const card = document.createElement('div');
  card.className = `seq-card ${seq.isLoad ? '' : 'rest'}`;

  if (seq.isLoad) {
    card.innerHTML = `
      <div class="seq-header">
        <span class="seq-name">Charge #${Math.ceil(seq.id/2)}</span>
        <span class="seq-duration">${s.duration.toFixed(1)}s</span>
      </div>
      <div class="seq-stats">
        <span><span class="lbl">Moy:</span> ${s.avg.toFixed(1)}kg</span>
        <span><span class="lbl">Max:</span> ${s.max.toFixed(1)}kg</span>
        <span><span class="lbl">G:</span> ${s.leftAvg.toFixed(1)} <span class="lbl">D:</span> ${s.rightAvg.toFixed(1)}</span>
      </div>`;
  } else {
    card.innerHTML = `
      <div class="seq-header">
        <span class="seq-name">Repos</span>
        <span class="seq-duration">${s.duration.toFixed(1)}s</span>
      </div>`;
  }

  document.getElementById('historyList').prepend(card);
}

// ===== CHART =====
function drawChart() {
  const canvas = document.getElementById('liveChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx.scale(dpr, dpr);

  const w = canvas.clientWidth;
  const h = canvas.clientHeight;

  ctx.clearRect(0, 0, w, h);

  if (chartData.length < 2) {
    if (sessionRunning) requestAnimationFrame(drawChart);
    return;
  }

  const maxForce = Math.max(20, ...chartData.map(d => d.v)) * 1.1;

  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = (i / 4) * h;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }

  const threshY = h - (LOAD_THRESHOLD / maxForce) * h;
  ctx.strokeStyle = 'rgba(255,107,53,0.3)';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, threshY); ctx.lineTo(w, threshY); ctx.stroke();
  ctx.setLineDash([]);

  ctx.beginPath();
  ctx.strokeStyle = '#ff6b35';
  ctx.lineWidth = 2;
  chartData.forEach((d, i) => {
    const x = (i / (CHART_WINDOW - 1)) * w;
    const y = h - (d.v / maxForce) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, 'rgba(255,107,53,0.3)');
  grad.addColorStop(1, 'rgba(255,107,53,0)');
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  ctx.strokeStyle = 'rgba(24,255,255,0.4)';
  ctx.lineWidth = 1;
  chartData.forEach((d, i) => {
    const x = (i / (CHART_WINDOW - 1)) * w;
    const y = h - (d.l / maxForce) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.beginPath();
  ctx.strokeStyle = 'rgba(179,136,255,0.4)';
  ctx.lineWidth = 1;
  chartData.forEach((d, i) => {
    const x = (i / (CHART_WINDOW - 1)) * w;
    const y = h - (d.r / maxForce) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  if (sessionRunning) requestAnimationFrame(drawChart);
}

// ===== SUMMARY =====
function showSummary(serverStats) {
  const loadSeqs = sequences.filter(s => s.isLoad && s.stats);
  const restSeqs = sequences.filter(s => !s.isLoad && s.stats);

  if (loadSeqs.length === 0 && !serverStats) {
    setStatus('Aucune sequence de charge detectee.');
    return;
  }

  // Use server stats if available, else local
  const useServer = !!serverStats;

  let perfScore, globalMax, globalAvg, totalDuration, totalLoadTime, totalRestTime, numSequences;

  if (useServer) {
    perfScore = Math.round(parseFloat(serverStats.performance_score || 0));
    globalMax = parseFloat(serverStats.total_max_force_kg || 0);
    globalAvg = parseFloat(serverStats.total_avg_force_kg || 0);
    totalDuration = serverStats.total_duration_s || 0;
    totalLoadTime = serverStats.total_load_time_s || 0;
    totalRestTime = serverStats.total_rest_time_s || 0;
    numSequences = serverStats.num_sequences || 0;
  } else {
    totalDuration = (Date.now() - sessionStartTime) / 1000;
    totalLoadTime = loadSeqs.reduce((a, s) => a + s.stats.duration, 0);
    totalRestTime = restSeqs.reduce((a, s) => a + s.stats.duration, 0);
    const allMaxes = loadSeqs.map(s => s.stats.max);
    const allAvgs = loadSeqs.map(s => s.stats.avg);
    globalMax = Math.max(...allMaxes);
    globalAvg = allAvgs.reduce((a,b) => a+b, 0) / allAvgs.length;
    numSequences = loadSeqs.length;
    const consistency = allAvgs.length > 1 ? 1 - (standardDev(allAvgs) / globalAvg) : 1;
    const endurance = loadSeqs.length > 2 ? allAvgs[allAvgs.length-1] / allAvgs[0] : 1;
    perfScore = Math.round(Math.min(100, (consistency * 50 + Math.min(1, endurance) * 50)));
  }

  const sourceBadge = useServer ? '<span class="server-badge">Stats serveur</span>' : '';

  const el = document.getElementById('summaryContent');
  el.innerHTML = `
    <h2>Resume Seance ${sourceBadge}</h2>
    <div class="subtitle">Duree totale: ${formatTime(totalDuration)}</div>

    <div class="perf-score">
      <div class="score-label">Score Performance</div>
      <div class="score-value">${perfScore}</div>
      <div class="score-label">${perfScore >= 80 ? 'Excellent' : perfScore >= 60 ? 'Bon' : 'A ameliorer'}</div>
      ${useServer && serverStats.score_breakdown ? `
        <div style="margin-top:12px;font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace">
          Force: ${serverStats.score_breakdown.force} |
          Endurance: ${serverStats.score_breakdown.endurance} |
          Stabilite: ${serverStats.score_breakdown.stability} |
          Volume: ${serverStats.score_breakdown.volume}
        </div>
      ` : ''}
    </div>

    <div class="summary-stats">
      <div class="summary-stat">
        <div class="s-label">Force Max</div>
        <div class="s-value" style="color:var(--accent)">${globalMax.toFixed(1)}<small>kg</small></div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Moy. Charges</div>
        <div class="s-value" style="color:var(--cyan)">${globalAvg.toFixed(1)}<small>kg</small></div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Temps Charge</div>
        <div class="s-value" style="color:var(--green)">${formatTime(totalLoadTime)}</div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Temps Repos</div>
        <div class="s-value" style="color:var(--text-dim)">${formatTime(totalRestTime)}</div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Nb Sequences</div>
        <div class="s-value">${numSequences}</div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Ratio Charge</div>
        <div class="s-value">${totalLoadTime + totalRestTime > 0 ? Math.round(totalLoadTime / (totalLoadTime + totalRestTime) * 100) : 0}%</div>
      </div>
      ${useServer && serverStats.left_avg_force_kg ? `
      <div class="summary-stat">
        <div class="s-label">Gauche Moy</div>
        <div class="s-value" style="color:var(--cyan)">${parseFloat(serverStats.left_avg_force_kg).toFixed(1)}<small>kg</small></div>
      </div>
      <div class="summary-stat">
        <div class="s-label">Droite Moy</div>
        <div class="s-value" style="color:var(--purple)">${parseFloat(serverStats.right_avg_force_kg || 0).toFixed(1)}<small>kg</small></div>
      </div>
      ` : ''}
      ${useServer && serverStats.is_personal_best ? `
      <div class="summary-stat" style="grid-column:1/-1;background:rgba(255,107,53,0.15);border:1px solid rgba(255,107,53,0.3)">
        <div class="s-value" style="color:var(--accent);font-size:18px">RECORD PERSONNEL !</div>
      </div>
      ` : ''}
    </div>

    ${loadSeqs.length > 0 ? `
    <div class="summary-sequences">
      <h3>Detail sequences (local)</h3>
      ${loadSeqs.map((s, i) => {
        const allAvgs = loadSeqs.map(sq => sq.stats.avg);
        return `
        <div class="seq-card" style="border-left-color: ${i === 0 ? 'var(--green)' : allAvgs[i] >= allAvgs[0]*0.9 ? 'var(--accent)' : 'var(--red)'}">
          <div class="seq-header">
            <span class="seq-name">Charge #${i+1}</span>
            <span class="seq-duration">${s.stats.duration.toFixed(1)}s</span>
          </div>
          <div class="seq-stats">
            <span><span class="lbl">Moy:</span> ${s.stats.avg.toFixed(1)}kg</span>
            <span><span class="lbl">Max:</span> ${s.stats.max.toFixed(1)}kg</span>
            <span><span class="lbl">G:</span>${s.stats.leftAvg.toFixed(1)} <span class="lbl">D:</span>${s.stats.rightAvg.toFixed(1)}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
    ` : ''}

    <button class="btn-close-summary" onclick="closeSummary()">FERMER</button>
  `;

  document.getElementById('summaryOverlay').classList.add('active');
  document.getElementById('syncIndicator').classList.remove('visible');
}

function closeSummary() {
  document.getElementById('summaryOverlay').classList.remove('active');
}

// ===== PAST SESSIONS =====
function togglePastSessions() {
  const header = document.getElementById('pastSessionsHeader');
  const list = document.getElementById('pastSessionsList');
  header.classList.toggle('open');
  list.classList.toggle('open');
}

async function loadPastSessions() {
  try {
    const data = await api.getSessions(1, 10);
    const list = document.getElementById('pastSessionsList');

    if (!data.items || data.items.length === 0) {
      list.innerHTML = '<div style="padding:12px;color:var(--text-dim);font-size:13px">Aucune seance enregistree</div>';
      return;
    }

    list.innerHTML = data.items.map(s => {
      const date = new Date(s.started_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
      const duration = s.duration_s ? formatTime(s.duration_s) : '--';
      return `
        <div class="past-session-card" onclick="showPastSession('${s.id}')">
          <div class="ps-header">
            <span class="ps-title">${s.title || 'Seance'}</span>
            <span class="ps-date">${date}</span>
          </div>
          <div class="ps-stats">
            <span><span class="lbl">Duree:</span> ${duration}</span>
            <span><span class="lbl">Status:</span> ${s.status}</span>
          </div>
        </div>`;
    }).join('');
  } catch (e) {
    console.error('Failed to load sessions:', e);
  }
}

async function showPastSession(sessionId) {
  try {
    const data = await api.getSession(sessionId);
    const stats = data.stats;

    if (!stats) {
      setStatus('Pas de stats pour cette seance');
      return;
    }

    // Reuse showSummary with server stats but no local sequences
    sequences = [];
    sessionStartTime = new Date(data.session.started_at).getTime();
    showSummary(stats);
  } catch (e) {
    console.error('Failed to load session:', e);
    setStatus(`Erreur: ${e.message}`);
  }
}

// ===== SIMULATOR (debug mode) =====
function startSimulation() {
  if (simulating) return;
  simulating = true;
  updateStartBtn();

  document.getElementById('btnConnectL').classList.add('connected');
  document.getElementById('statusL').textContent = 'Simulateur';
  document.getElementById('btnConnectR').classList.add('connected');
  document.getElementById('statusR').textContent = 'Simulateur';

  let tick = 0;
  const simInterval = setInterval(() => {
    if (tick >= 800) { // 10s at 80Hz
      clearInterval(simInterval);
      simulating = false;
      setStatus('Simulation terminee');
      return;
    }

    // Simulate load/rest pattern: 4s load, 2s rest, 4s load
    const tSec = tick / 80;
    if (tSec < 4 || (tSec >= 6 && tSec < 10)) {
      // Load phase: sinusoidal 20-40kg
      forceL = 15 + 5 * Math.sin(tick * 0.1) + Math.random() * 2;
      forceR = 15 + 5 * Math.cos(tick * 0.08) + Math.random() * 2;
    } else {
      // Rest phase
      forceL = 0.2 + Math.random() * 0.3;
      forceR = 0.2 + Math.random() * 0.3;
    }

    updateDisplay();
    if (sessionRunning) processForce();
    tick++;
  }, 12); // ~80Hz
}

// ===== UTILS =====
function standardDev(arr) {
  const avg = arr.reduce((a,b) => a+b, 0) / arr.length;
  return Math.sqrt(arr.reduce((a,b) => a + (b-avg)**2, 0) / arr.length);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.round(seconds % 60);
  return m > 0 ? `${m}m${String(s).padStart(2,'0')}s` : `${s}s`;
}

function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

// ===== UI STATE MANAGEMENT =====
function showLoginScreen() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appContent').classList.remove('visible');
  document.getElementById('userBar').classList.remove('visible');
}

async function showApp() {
  document.getElementById('loginScreen').style.display = 'none';

  // Sync user with API
  try {
    currentUser = await api.syncUser();
    document.getElementById('userName').textContent = currentUser.display_name || currentUser.email;
    document.getElementById('userRole').textContent = currentUser.role;
  } catch (e) {
    console.error('User sync failed:', e);
    const payload = decodeJwtPayload(accessToken);
    document.getElementById('userName').textContent = payload?.name || payload?.preferred_username || 'Utilisateur';
    document.getElementById('userRole').textContent = '';
  }

  document.getElementById('userBar').classList.add('visible');
  document.getElementById('appContent').classList.add('visible');

  // Check BLE support
  if (!navigator.bluetooth) {
    setStatus('Web Bluetooth non supporte. Utilise Chrome ou Bluefy.');
    document.querySelectorAll('.connect-btn').forEach(b => b.disabled = true);
  } else {
    setStatus('Pret -- connecte tes capteurs Tindeq');
  }

  // Show debug panel if ?debug=1
  if (new URLSearchParams(window.location.search).get('debug') === '1') {
    document.getElementById('debugPanel').classList.add('visible');
  }

  // Load past sessions
  loadPastSessions();
}

// ===== INIT =====
(async function init() {
  // Check for OAuth callback
  const authenticated = await handleCallback();
  if (authenticated) {
    await showApp();
    return;
  }

  // Not authenticated
  showLoginScreen();
  setStatus('Connecte-toi pour commencer');
})();
</script>
